<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" role="img" aria-label="Ember">
  <defs>
    <linearGradient id="emberOuter" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#FF8C42"/>
      <stop offset="55%"  stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E63946"/>
    </linearGradient>
    <linearGradient id="emberInner" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#FFE3A3"/>
      <stop offset="60%"  stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>
    <radialGradient id="emberCore" cx="0.5" cy="0.7" r="0.45">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="60%"  stop-color="#FFE3A3" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFD166" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer flame: asymmetric, curling tip leans right -->
  <path d="M21 2
           C17 8 11 11 10 18
           C9  24 12 28 14 31
           C9  31 8  27 9  24
           C7  29 9  35 16 37
           C22 39 31 36 31 27
           C31 22 27 19 26 14
           C25 10 24 6 21 2 Z"
        fill="url(#emberOuter)"/>

  <!-- Inner flame: brighter, smaller, offset for depth -->
  <path d="M21 11
           C19 15 15 18 16 23
           C17 27 19 29 20 32
           C22 30 25 28 25 24
           C25 20 22 17 21 11 Z"
        fill="url(#emberInner)"/>

  <!-- Hot core highlight -->
  <ellipse cx="21" cy="27" rx="3" ry="5" fill="url(#emberCore)"/>
</svg>
