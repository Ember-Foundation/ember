name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython
          pip install -e ".[dev]"

      - name: Build Cython extensions inplace
        run: python setup.py build_ext --inplace

      - name: Verify Cython extensions loaded
        run: |
          python -c "
          for m in [
            'ember.protocol.cprotocol',
            'ember.router.router',
            'ember.request.request',
            'ember.response.response',
            'ember.headers.headers',
          ]:
              __import__(m)
          print('All Cython extensions OK')
          "

      - name: Run tests
        run: pytest --tb=short -q

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check ember/ tests/ --ignore E501
