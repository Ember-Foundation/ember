name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (${{ matrix.package }} / py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package: [emberloop, ember-cache, ember-api]
        python-version: ["3.12", "3.13"]
        os: [ubuntu-latest, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Install liburing-dev (Linux only, for emberloop io_uring)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y liburing-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync workspace
        run: uv sync --python ${{ matrix.python-version }}

      - name: Build Cython extensions
        if: matrix.package != 'ember-cache'
        run: uv run --directory packages/${{ matrix.package }} python setup.py build_ext --inplace

      - name: Run tests
        run: uv run pytest packages/${{ matrix.package }}/tests --tb=short -q

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv tool install ruff
      - run: uv tool run ruff check packages/ --ignore E501
