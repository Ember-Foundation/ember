name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to upload (testpypi or pypi)"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build manylinux wheels for every supported CPython on x86_64 + aarch64
  # ─────────────────────────────────────────────────────────────────────────────
  wheels-linux:
    name: Build wheels (linux ${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for aarch64)
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build wheels with cibuildwheel
        run: uv tool run --from cibuildwheel cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: "cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}
          CIBW_BEFORE_ALL_LINUX: "yum install -y liburing-devel"
          # Distribution wheels: portable baseline, NOT -march=native
          CIBW_ENVIRONMENT_LINUX: "CFLAGS='-O3 -fno-strict-aliasing' CXXFLAGS='-O3'"
          CIBW_TEST_COMMAND: 'python -c "import ember; from ember.eventloop import uring; print(ember.__version__)"'
          # aarch64 emulation is slow — skip the import test there to save CI time
          CIBW_TEST_SKIP: "*-linux_aarch64"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.arch }}
          path: dist/*.whl

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Build macOS wheels (no io_uring — setup.py auto-skips that extension)
  # ─────────────────────────────────────────────────────────────────────────────
  wheels-macos:
    name: Build wheels (macos ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-13
          - arch: arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build wheels with cibuildwheel
        run: uv tool run --from cibuildwheel cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: "cp312-* cp313-*"
          CIBW_ARCHS_MACOS: ${{ matrix.arch }}
          CIBW_ENVIRONMENT_MACOS: "CFLAGS='-O3' CXXFLAGS='-O3' MACOSX_DEPLOYMENT_TARGET=11.0"
          CIBW_TEST_COMMAND: 'python -c "import ember; print(ember.__version__)"'

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.arch }}
          path: dist/*.whl

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Build the sdist (one job, any OS — uses uv build)
  # ─────────────────────────────────────────────────────────────────────────────
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build sdist
        run: uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Publish to TestPyPI or PyPI via OIDC trusted publishing
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'pypi' }}
    needs: [wheels-linux, wheels-macos, sdist]
    runs-on: ubuntu-latest

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Check distributions
        run: uv tool run --from twine twine check dist/*

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: uv publish --publish-url https://test.pypi.org/legacy/ dist/*

      - name: Publish to PyPI
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish dist/*
