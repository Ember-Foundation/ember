name: Publish emberloop

on:
  push:
    tags: ["emberloop-v*.*.*"]
  workflow_dispatch:
    inputs:
      target:
        description: "testpypi or pypi"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

defaults:
  run:
    working-directory: packages/emberloop

jobs:
  wheels-linux:
    name: Wheels (linux ${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for aarch64)
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: astral-sh/setup-uv@v3

      - name: Build wheels with cibuildwheel
        run: uv tool run --from cibuildwheel cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: "cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}
          CIBW_BEFORE_ALL_LINUX: |
            curl -fsSL https://github.com/axboe/liburing/archive/refs/tags/liburing-2.6.tar.gz -o /tmp/liburing.tar.gz
            tar xzf /tmp/liburing.tar.gz -C /tmp
            cd /tmp/liburing-liburing-2.6
            ./configure --prefix=/usr
            make -j"$(nproc)" install
          CIBW_ENVIRONMENT_LINUX: "CFLAGS='-O3 -fno-strict-aliasing' CXXFLAGS='-O3'"
          CIBW_TEST_COMMAND: 'python -c "from ember.eventloop import uring; from ember.protocol.cprotocol import HTTPParser; print(\"ok\")"'
          CIBW_TEST_SKIP: "*-manylinux_aarch64"

      - uses: actions/upload-artifact@v4
        with:
          name: emberloop-wheels-linux-${{ matrix.arch }}
          path: packages/emberloop/dist/*.whl

  wheels-macos:
    name: Wheels (macos ${{ matrix.arch }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - name: Build wheels with cibuildwheel
        run: uv tool run --from cibuildwheel cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: "cp312-* cp313-*"
          CIBW_ARCHS_MACOS: ${{ matrix.arch }}
          CIBW_ENVIRONMENT_MACOS: "CFLAGS='-O3' CXXFLAGS='-O3' MACOSX_DEPLOYMENT_TARGET=11.0"
          CIBW_TEST_COMMAND: 'python -c "from ember.protocol.cprotocol import HTTPParser; print(\"ok\")"'
          CIBW_TEST_SKIP: "*-macosx_x86_64"

      - uses: actions/upload-artifact@v4
        with:
          name: emberloop-wheels-macos-${{ matrix.arch }}
          path: packages/emberloop/dist/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: emberloop-sdist
          path: packages/emberloop/dist/*.tar.gz

  publish:
    name: Publish to ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'pypi' }}
    needs: [wheels-linux, wheels-macos, sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: emberloop-*
          merge-multiple: true

      - run: ls -lh dist/

      - uses: astral-sh/setup-uv@v3

      - name: twine check
        run: uv tool run --from twine twine check dist/*

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
        run: uv publish --publish-url https://test.pypi.org/legacy/ dist/*

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/emberloop-v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        run: uv publish dist/*
