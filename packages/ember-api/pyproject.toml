[build-system]
requires = ["setuptools>=68", "cython>=3.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ember-api"
version = "0.1.0"
description = "The fastest Python web framework — Cython hot paths, io_uring, multi-process workers, built-in TTL + single-flight caching"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
    { name = "Mohammad Ismail", email = "ismail.buet404@gmail.com" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Internet :: WWW/HTTP :: HTTP Servers",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]
dependencies = [
    "emberloop>=0.1.0",
    "ember-cache>=0.1.0",
]

[project.optional-dependencies]
fast      = ["uvloop>=0.19", "orjson>=3.9"]
redis     = ["ember-cache[redis]>=0.1.0"]
memcached = ["ember-cache[memcached]>=0.1.0"]
all       = ["uvloop>=0.19", "orjson>=3.9", "redis>=5.0", "aiomcache>=0.8", "httpx>=0.27"]
dev       = ["pytest>=8.0", "pytest-asyncio>=0.23", "httpx>=0.27"]

[project.scripts]
ember = "ember.cli:cli"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where      = ["src"]
include    = ["ember*"]
namespaces = true

[tool.setuptools.package-data]
"ember.router"          = ["*.pxd", "*.pyx"]
"ember.ai.ratelimit"    = ["*.pxd", "*.pyx"]
"ember.ai.sse"          = ["*.pxd", "*.pyx"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["tests"]
