[build-system]
requires = ["setuptools>=68", "cython>=3.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "emberloop"
version = "0.1.0"
description = "io_uring event loop + Cython HTTP/1.1 protocol layer (llhttp parser, request/response objects) — the low-level core of Ember"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
    { name = "Mohammad Ismail", email = "ismail.buet404@gmail.com" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries",
]
dependencies = []

[project.optional-dependencies]
fast = ["uvloop>=0.19"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where    = ["src"]
include  = ["ember*"]
namespaces = true

[tool.setuptools.package-data]
"ember.headers"  = ["*.pxd", "*.pyx"]
"ember.protocol" = ["*.pxd", "*.pyx"]
"ember.request"  = ["*.pxd", "*.pyx"]
"ember.response" = ["*.pxd", "*.pyx"]
"ember.eventloop" = ["*.pxd", "*.pyx"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["tests"]
