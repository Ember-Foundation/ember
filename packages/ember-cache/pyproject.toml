[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ember-cache"
version = "0.1.0"
description = "TTL + single-flight response cache, plus Redis & Memcached backends — for the Ember web framework"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
    { name = "Mohammad Ismail", email = "ismail.buet404@gmail.com" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "emberloop>=0.1.0",
]

[project.optional-dependencies]
redis     = ["redis>=5.0"]
memcached = ["aiomcache>=0.8"]
all       = ["redis>=5.0", "aiomcache>=0.8"]
dev       = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where      = ["src"]
include    = ["ember*"]
namespaces = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["tests"]
